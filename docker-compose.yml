version: '3.8'

services:
  agent-orchestra:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-orchestra
    restart: unless-stopped
    ports:
      - "3210:3210"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3210
      - OPENCLAW_API_URL=${OPENCLAW_API_URL:-http://localhost:8080}
      - OPENCLAW_API_TOKEN=${OPENCLAW_API_TOKEN:-}
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');http.get('http://127.0.0.1:3210/api/health',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1));"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Watchtower for auto-updates
  # Uncomment to enable automatic container updates
  # watchtower:
  #   image: containrrr/watchtower
  #   container_name: watchtower
  #   restart: unless-stopped
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   environment:
  #     - WATCHTOWER_CLEANUP=true
  #     - WATCHTOWER_SCHEDULE=0 0 4 * * *
  #   command: --interval 86400 agent-orchestra
